name: CI

on:
  push:
    branches: [ 'main', 'dev' ]
  pull_request:
    branches: [ 'main', 'dev' ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -sSf https://get.moonbitlang.com | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Build
        run: moon build

      - name: Test
        run: moon test

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -sSf https://get.moonbitlang.com | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Check formatting
        run: moon fmt --check
