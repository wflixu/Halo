name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MoonBit
        run: |
          curl -sSf https://get.moonbitlang.com | bash
          echo "$HOME/.moon/bin" >> $GITHUB_PATH

      - name: Publish to mooncakes.io
        run: |
          moon publish
        env:
          MOONCAKE_TOKEN: ${{ secrets.MOONCAKE_TOKEN }}
